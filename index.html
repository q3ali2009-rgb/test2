<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العاشر الذكية 🇰🇼</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d1b2; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* شاشة الدخول */
        #login-screen { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; width: 320px; border: 2px solid var(--primary); }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; background: #0f172a; color: white; text-align: center; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* المحتوى */
        #main-content { display: none; width: 95vw; height: 90vh; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px; }
        .box { background: var(--card); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .header { grid-column: span 2; background: linear-gradient(90deg, #007a3d, #ce1126); padding: 10px; border-radius: 15px; text-align: center; }
        
        iframe { width: 100%; flex-grow: 1; border-radius: 10px; background: white; border: none; }
        
        /* الشات */
        #chat-window { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .ai { background: #334155; align-self: flex-start; }
        .user { background: var(--primary); color: #0f172a; align-self: flex-end; }
        
        @media (max-width: 850px) { #main-content { grid-template-columns: 1fr; } .header { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="margin:0">🇰🇼</h1>
        <h2>دخول المنصة</h2>
        <input type="password" id="passInput" placeholder="كلمة المرور (alinasser)">
        <button onclick="login()">دخول 🚀</button>
    </div>

    <div id="main-content">
        <div class="header"><h3>منصة العاشر - المنهج الكويتي 🇰🇼 ✨</h3></div>

        <div class="box">
            <h4 style="margin:0 0 10px 0">📚 الكتب والملفات</h4>
            <select onchange="document.getElementById('pdf').src = this.value" style="width:100%; padding:8px; border-radius:5px; margin-bottom:10px;">
                <option value="https://docs.google.com/viewer?embedded=true&url=https://kw-edu.com/files/view/10-islamic-t2.pdf">📖 تربية إسلامية - الفصل الثاني</option>
                <option value="https://docs.google.com/viewer?embedded=true&url=https://kw-edu.com/files/view/10-physics-bank-t1.pdf">🔬 بنك أسئلة الفيزياء - الفصل الأول</option>
            </select>
            <iframe id="pdf" src="https://docs.google.com/viewer?embedded=true&url=https://kw-edu.com/files/view/10-islamic-t2.pdf"></iframe>
        </div>

        <div class="box">
            <h4 style="margin:0 0 10px 0">🤖 دحيح AI (Gemini 3 Flash)</h4>
            <div id="chat-window">
                <div class="msg ai">هلا بك! أنا ذكاء اصطناعي مربوط بموديل **Gemini 3 Flash** المتطور. اسألني أي شي عن منهجك وابشر بسعدك! 🇰🇼🔥</div>
            </div>
            <div style="display:flex; gap:5px">
                <input type="text" id="aiMsg" placeholder="اسألني شي..." style="margin:0">
                <button onclick="askAI()" style="width:auto">ارسل</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ حط المفتاح اللي نسخته من الصورة هنا بدال النجوم
        const API_KEY = "ضـع_مـفـتـاحـك_هـنـا"; 

        function login() {
            const p = document.getElementById('passInput').value;
            if(p === "alinasser" || p === "ali") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
            } else { alert("الباسورد غلط!"); }
        }

        async function askAI() {
            const input = document.getElementById('aiMsg');
            const chat = document.getElementById('chat-window');
            if(!input.value) return;

            const userTxt = input.value;
            chat.innerHTML += `<div class="msg user">${userTxt}</div>`;
            input.value = '';
            
            const tempId = "loading-" + Date.now();
            chat.innerHTML += `<div class="msg ai" id="${tempId}">قاعد أكتب لك الرد... ✍️</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                // استخدام رابط الـ API المتوافق مع المتصفحات
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "أنت مساعد دراسي كويتي ذكي جداً، تجيب بوضوح وإيموجيات وبلهجة كويتية خفيفة: " + userTxt }]}]
                    })
                });

                const data = await response.json();
                const aiRes = data.candidates[0].content.parts[0].text;
                document.getElementById(tempId).innerText = aiRes;
            } catch (e) {
                document.getElementById(tempId).innerText = "صار خطأ! تأكد من وضع الـ API Key بشكل صحيح في الكود.";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
