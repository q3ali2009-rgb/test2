<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة العاشر الذكية 🇰🇼</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d1b2;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة الدخول */
        #login-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            width: 350px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        button {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* المحتوى الرئيسي */
        #main-content {
            display: none;
            width: 95vw;
            max-width: 1300px;
            height: 90vh;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin: 20px;
        }

        .section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }

        iframe {
            width: 100%;
            flex-grow: 1;
            border-radius: 12px;
            border: none;
            background: white;
        }

        /* تصميم الشات */
        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .ai { background: #334155; align-self: flex-start; border-bottom-right-radius: 2px; }
        .user { background: var(--primary); color: #0f172a; align-self: flex-end; border-bottom-left-radius: 2px; }

        .kwt-header {
            grid-column: span 2;
            text-align: center;
            padding: 10px;
            background: linear-gradient(90deg, #007a3d, #ce1126);
            border-radius: 15px;
            margin-bottom: 10px;
        }

        @media (max-width: 850px) {
            #main-content { grid-template-columns: 1fr; height: auto; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 4rem; margin: 0;">🇰🇼</h1>
        <h2>يا هلا بطل العاشر</h2>
        <p>ادخل كلمة السر (alinasser)</p>
        <input type="password" id="passInput" placeholder="كلمة المرور...">
        <button onclick="login()">دخول المنصة 🚀</button>
    </div>

    <div id="main-content">
        <div class="kwt-header">
            <h2 style="margin: 5px;">بوابة الصف العاشر - المنهج الكويتي 🇰🇼 ✨</h2>
        </div>

        <div class="section">
            <h3 style="margin-top: 0;">📚 الكتب وبنوك الأسئلة</h3>
            <select onchange="document.getElementById('pdf').src = this.value" style="padding: 10px; margin-bottom: 10px; border-radius: 8px;">
                <option value="https://kw-edu.com/files/view/10-islamic-t2.pdf">📖 إسلامية - الفصل الثاني</option>
                <option value="https://kw-edu.com/files/view/10-physics-bank-t1.pdf">🔬 بنك أسئلة الفيزياء - الفصل الأول</option>
            </select>
            <iframe id="pdf" src="https://kw-edu.com/files/view/10-islamic-t2.pdf"></iframe>
        </div>

        <div class="section">
            <h3 style="margin-top: 0;">🤖 دحيح AI (Gemini 3)</h3>
            <div id="chat-window">
                <div class="msg ai">حياك الله! أنا ذكاء اصطناعي مربوط بـ Gemini 3 Flash. اسألني أي شي بالمنهج وابشر بسعدك! 🇰🇼🔥</div>
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="aiMsg" placeholder="اسأل الدحيح..." style="margin: 0;">
                <button onclick="askGemini()" style="width: auto;">ارسل</button>
            </div>
        </div>
    </div>

    <script>
        // مفتاحك اللي نسخته من الصورة (حطه هنا بين الكوتيشن)
        const MY_API_KEY = "ضـع_مـفـتـاحـك_هـنـا"; 

        function login() {
            const p = document.getElementById('passInput').value;
            if(p === "alinasser" || p === "ali") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
            } else {
                alert("الباسورد غلط يا وحش!");
            }
        }

        async function askGemini() {
            const input = document.getElementById('aiMsg');
            const chat = document.getElementById('chat-window');
            const userText = input.value;
            if(!userText) return;

            // عرض رسالة المستخدم
            chat.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = '';
            
            // رسالة انتظار
            const tempId = "loading-" + Date.now();
            chat.innerHTML += `<div class="msg ai" id="${tempId}">قاعد أفكر لك... 🤔</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                // الربط مع موديل gemini-3-flash-preview اللي شفته بالصورة
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "أنت مساعد دراسي كويتي خبير. أجب باختصار وذكاء وبلهجة كويتية محببة مع إيموجيات على: " + userText }]}]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                document.getElementById(tempId).innerText = aiResponse;
            } catch (e) {
                document.getElementById(tempId).innerText = "صار خطأ! تأكد إنك حطيت الـ API Key صح في الكود.";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
